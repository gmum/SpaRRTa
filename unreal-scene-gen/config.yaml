# =============================================================================
# SpaRRTa Scene Generation Configuration
# =============================================================================
# This is the master configuration file for the unreal-scene-gen pipeline.
# Change `active_environment` and `active_triple` to switch what gets generated.

# ---- Active Selection ----
# Which environment and triple to generate scenes for in this run.
active_environment: "desert"
active_triple: "desert_1"

# ---- Output Settings ----
output_dir: "output"
num_images: 500

# ---- Screenshot Settings ----
screenshot_resolution: [2048, 2048]

# ---- Camera Intrinsics ----
camera_intrinsics:
  sensor_mm: 50.0
  focal_length: 50.0
  aperture: 10.0

# =============================================================================
# Environments
# =============================================================================
# Each environment defines its world-space anchor pose, sampling parameters,
# and the object triples available for scene generation.

environments:
  desert:
    pose: [67170.0, 40950.0, -36400.0]
    sampling:
      obj_proximity: 500
      sample_radius: 300
      max_distance: 1000
      camera_range: 2500
      camera_height_range: 1500
    triples:
      desert_1:
        source: "truck"
        target: "rock"
        viewpoint: "human_1"
      desert_2:
        source: "camel"
        target: "cactus"
        viewpoint: "human_2"
      desert_3:
        source: "camel"
        target: "barrel"
        viewpoint: "human_3"

  forest:
    pose: [182540.0, -48990.0, 1020.0]
    sampling:
      obj_proximity: 500
      sample_radius: 300
      max_distance: 1000
      camera_range: 2500
      camera_height_range: 1500
    triples:
      forest_1:
        source: "tree"
        target: "rock"
        viewpoint: "human_1"
      forest_2:
        source: "bear"
        target: "tent"
        viewpoint: "human_2"
      forest_3:
        source: "fox"
        target: "rock"
        viewpoint: "human_3"

  winter_town:
    pose: [-800.0, -4400.0, 97.0]
    sampling:
      obj_proximity: 500
      sample_radius: 300
      max_distance: 1000
      camera_range: 2500
      camera_height_range: 1500
    triples:
      winter_1:
        source: "truck"
        target: "tree"
        viewpoint: "human_1"
      winter_2:
        source: "husky"
        target: "snowman"
        viewpoint: "human_2"
      winter_3:
        source: "deer"
        target: "tree"
        viewpoint: "human_3"

  bridge:
    pose: [-440.0, -40.0, 0.0]
    sampling:
      obj_proximity: 500
      sample_radius: 300
      max_distance: 1000
      camera_range: 2500
      camera_height_range: 1500
    triples:
      bridge_1:
        source: "truck"
        target: "tree"
        viewpoint: "human_1"
      bridge_2:
        source: "bike"
        target: "trash_bin"
        viewpoint: "human_2"
      bridge_3:
        source: "vespa"
        target: "trash_bin"
        viewpoint: "human_3"

  city:
    pose: [-25640.0, 15330.0, 70.0]
    sampling:
      obj_proximity: 500
      sample_radius: 300
      max_distance: 1000
      camera_range: 2500
      camera_height_range: 1500
    triples:
      city_1:
        source: "vespa"
        target: "cone"
        viewpoint: "human_1"
      city_2:
        source: "taxi"
        target: "fire_hydrant"
        viewpoint: "human_2"
      city_3:
        source: "bike"
        target: "cone"
        viewpoint: "human_3"

